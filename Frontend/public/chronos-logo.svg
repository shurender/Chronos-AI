      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="chronos-accent" x1="18" y1="18" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
