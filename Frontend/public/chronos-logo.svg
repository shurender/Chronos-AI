  <title id="title">Chronos Engine logo</title>
  <desc id="desc">A circular decision path around a central node.</desc>
  <defs>
    <linearGradient id="chronos-mark" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
