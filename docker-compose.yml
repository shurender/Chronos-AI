# Full local stack: backend (FastAPI :8000) + frontend (Vite preview :5173).
# Runs with mock/demo providers by default — no API keys required.
#   docker compose up --build
# Override any value via a .env file in this directory (see .env.example).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      EVIDENCE_PROVIDER: ${EVIDENCE_PROVIDER:-demo}
      REQUIRE_LIVE_LLM: ${REQUIRE_LIVE_LLM:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      AGENT_MODE: ${AGENT_MODE:-deterministic}
      DEMO_MODE: ${DEMO_MODE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/gpt-oss-120b}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/connectors/github/callback}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_REDIRECT_URI: ${SLACK_REDIRECT_URI:-http://localhost:8000/connectors/slack/callback}
      NOTION_CLIENT_ID: ${NOTION_CLIENT_ID:-}
      NOTION_CLIENT_SECRET: ${NOTION_CLIENT_SECRET:-}
      NOTION_REDIRECT_URI: ${NOTION_REDIRECT_URI:-http://localhost:8000/connectors/notion/callback}
      NOTION_VERSION: ${NOTION_VERSION:-2026-03-11}
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      CONNECTOR_TOKEN_STORE: ${CONNECTOR_TOKEN_STORE:-local}
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:-dev-only-local-key}
      CONNECTOR_STORE_PATH: /data/connectors.json
      # All local stores centralized under the mounted /data volume.
      DATA_DIR: /data
      CHROMA_DB_PATH: /data/chroma_db
      GRAPH_PATH: /data/graph.gpickle
      PROVENANCE_DB_PATH: /data/provenance.db
      SIMULATION_DB_PATH: /data/simulations.db
      DIGITAL_TWIN_STORE_PATH: /data/profiles.json
      INGESTION_RUNS_STORE_PATH: /data/runs.json
      UPLOADED_EVIDENCE_STORE_PATH: /data/uploaded_evidence.json
      FORECAST_STORE_PATH: /data/forecasts.json
    volumes:
      - chronos_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  chronos_data:
